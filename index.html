<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Würfeltafel</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#181C26">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Würfeltafel">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --felt:#2A3040;
  --felt-dark:#181C26;
  --ivory:#F8F4E6;
  --ivory-dim:#D9D4C4;
  --pip:#22201C;
  --red:#C13A2B;
  --red-dark:#9C2E22;
  --green:#3E8E5A;
  --green-dark:#2F7048;
  --gold:#D9A441;
  --blue:#6E9BB8;
  --shadow:0 4px 14px rgba(0,0,0,.35);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Nunito',sans-serif;
  background:radial-gradient(circle at 50% 20%, var(--felt) 0%, var(--felt-dark) 100%);
  color:var(--ivory);
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 14px 40px;
}
.app{width:100%;max-width:420px}
h1{
  font-family:'Bungee',cursive;
  font-size:clamp(1.7rem,8vw,2.3rem);
  text-align:center;letter-spacing:.02em;
  color:var(--ivory);
  text-shadow:0 3px 0 rgba(0,0,0,.4);
  margin-bottom:2px;
}
.sub{text-align:center;font-size:.85rem;color:var(--ivory-dim);margin-bottom:18px;font-weight:600}

/* ---------- dice face ---------- */
.die{
  display:inline-grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  width:44px;height:44px;background:var(--ivory);border-radius:10px;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,.15), 0 2px 5px rgba(0,0,0,.35);
  padding:6px;gap:0;flex:none;
}
.die.big{width:72px;height:72px;border-radius:16px;padding:10px}
.die.small{width:30px;height:30px;padding:4px;border-radius:7px}
.die .p{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.die .p::after{content:'';width:62%;aspect-ratio:1;border-radius:50%;background:var(--pip);display:none}
.die.red .p::after{background:var(--red)}
.die.gold .p::after{background:var(--gold)}
.die[data-v="1"] .p:nth-child(5)::after{display:block}
.die[data-v="2"] .p:nth-child(3)::after,.die[data-v="2"] .p:nth-child(7)::after{display:block}
.die[data-v="3"] .p:nth-child(3)::after,.die[data-v="3"] .p:nth-child(5)::after,.die[data-v="3"] .p:nth-child(7)::after{display:block}
.die[data-v="4"] .p:nth-child(1)::after,.die[data-v="4"] .p:nth-child(3)::after,.die[data-v="4"] .p:nth-child(7)::after,.die[data-v="4"] .p:nth-child(9)::after{display:block}
.die[data-v="5"] .p:nth-child(1)::after,.die[data-v="5"] .p:nth-child(3)::after,.die[data-v="5"] .p:nth-child(5)::after,.die[data-v="5"] .p:nth-child(7)::after,.die[data-v="5"] .p:nth-child(9)::after{display:block}
.die[data-v="6"] .p:nth-child(1)::after,.die[data-v="6"] .p:nth-child(3)::after,.die[data-v="6"] .p:nth-child(4)::after,.die[data-v="6"] .p:nth-child(6)::after,.die[data-v="6"] .p:nth-child(7)::after,.die[data-v="6"] .p:nth-child(9)::after{display:block}

/* ---------- cards / panels ---------- */
.panel{
  background:rgba(0,0,0,.25);
  border:1px solid rgba(248,244,230,.12);
  border-radius:var(--radius);
  padding:16px;margin-bottom:14px;
}
.panel h2{font-size:1rem;font-weight:800;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}

label{display:block;font-size:.8rem;font-weight:700;color:var(--ivory-dim);margin-bottom:4px}
input[type=text],input[type=number]{
  width:100%;padding:12px;border-radius:10px;border:none;
  font-family:inherit;font-size:1.05rem;font-weight:700;
  background:var(--ivory);color:var(--pip);
}
input:focus-visible,button:focus-visible{outline:3px solid var(--gold);outline-offset:2px}

.row{display:flex;gap:10px}
.row>*{flex:1}

button{
  font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
  border:none;border-radius:12px;padding:13px 16px;cursor:pointer;
  transition:transform .08s ease, filter .1s ease;
}
button:active{transform:scale(.96)}
.btn-primary{background:var(--red);color:#fff;box-shadow:inset 0 -3px 0 var(--red-dark), var(--shadow)}
.btn-ivory{background:var(--ivory);color:var(--pip);box-shadow:inset 0 -3px 0 rgba(0,0,0,.15)}
.btn-ghost{background:transparent;color:var(--ivory-dim);border:2px solid rgba(248,244,230,.25)}
.btn-wide{width:100%}
button:disabled{opacity:.4;cursor:not-allowed}

/* ---------- game-select screen ---------- */
.gamepick{display:flex;flex-direction:column;gap:14px;margin-top:8px}
.gamepick .pick-btn{
  display:flex;align-items:center;gap:14px;
  padding:18px 18px;border-radius:18px;text-align:left;
  border:2px solid rgba(248,244,230,.15);
  background:rgba(0,0,0,.22);color:var(--ivory);
  box-shadow:var(--shadow);
}
.gamepick .pick-btn .icon{
  width:52px;height:52px;border-radius:14px;flex:none;
  display:flex;align-items:center;justify-content:center;font-size:1.6rem;
}
.gamepick .pick-btn.p30 .icon{background:var(--gold);color:var(--pip)}
.gamepick .pick-btn.ptutto .icon{background:var(--blue);color:var(--pip)}
.gamepick .pick-btn .txt{flex:1;min-width:0}
.gamepick .pick-btn .txt b{font-family:'Bungee',cursive;font-size:1.15rem;display:block;margin-bottom:3px;letter-spacing:.02em}
.gamepick .pick-btn .txt span{font-size:.82rem;color:var(--ivory-dim);font-weight:600;line-height:1.4;display:block}

/* ---------- options ---------- */
.opt{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.opt input[type=checkbox]{width:22px;height:22px;accent-color:var(--red);flex:none}
.opt .txt{font-weight:700;font-size:.9rem}
.opt .txt small{display:block;font-weight:600;color:var(--ivory-dim);font-size:.75rem;line-height:1.35}
.seg{display:flex;gap:8px}
.seg button{flex:1;border-radius:10px;background:rgba(0,0,0,.15);color:var(--ivory-dim);font-size:.78rem;padding:12px 10px;text-align:left;border:2px solid rgba(248,244,230,.2);font-weight:700;line-height:1.35}
.seg button small{display:block;font-weight:600;color:var(--ivory-dim);margin-top:3px}
.seg button.on{background:rgba(217,164,65,.12);border-color:var(--gold);color:var(--gold)}
.seg button.on small{color:var(--ivory-dim)}
.variant-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:4px}
.variant-grid button{
  padding:10px 0;border-radius:10px;background:transparent;color:var(--ivory-dim);
  border:2px solid rgba(248,244,230,.25);font-size:.95rem;
}
.variant-grid button.on{background:var(--gold);color:var(--pip);border-color:var(--gold)}
.variant-grid button small{display:block;font-size:.6rem;font-weight:700;opacity:.8}

/* ---------- player list ---------- */
.player-card{
  display:flex;align-items:center;gap:12px;
  background:var(--ivory);color:var(--pip);
  border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;
  box-shadow:var(--shadow);
  transition:opacity .3s, transform .2s;
  position:relative;overflow:hidden;
}
.player-card.current{
  outline:3px solid var(--gold);
  transform:scale(1.02);
}
.player-card.current::before{
  content:'AM ZUG';position:absolute;top:0;right:0;
  background:var(--gold);color:var(--pip);
  font-size:.6rem;font-weight:800;letter-spacing:.08em;
  padding:3px 8px;border-bottom-left-radius:8px;
}
.player-card.dead{opacity:.45;filter:grayscale(1)}
.player-card.shield{background:var(--ivory-dim)}
.player-card .pname{flex:1;font-weight:800;font-size:1.05rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-card .pname small{display:block;font-size:.65rem;font-weight:800;color:var(--red);letter-spacing:.04em}
.player-card .plives{
  font-family:'Bungee',cursive;font-size:1.5rem;line-height:1;
  min-width:56px;text-align:right;
}
.player-card .plives.neg{color:var(--red)}
.player-card .plives small{font-family:'Nunito',sans-serif;font-size:.6rem;font-weight:800;display:block;color:#8a8577;letter-spacing:.05em}
.player-card.dead .plives{font-size:1.2rem}
.hit{animation:hitflash .5s ease}
@keyframes hitflash{0%{background:#f3c8c2}100%{background:var(--ivory)}}
.heal{animation:healflash .5s ease}
@keyframes healflash{0%{background:#d9ecc8}100%{background:var(--ivory)}}

/* setup list */
.setup-item{display:flex;align-items:center;gap:10px;background:rgba(248,244,230,.08);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.setup-item .n{flex:1;font-weight:800}
.setup-item .x{background:none;color:var(--ivory-dim);font-size:1.1rem;padding:4px 8px}
.setup-item .reorder{display:flex;flex-direction:column;gap:2px;flex:none}
.setup-item .reorder button{font-size:.7rem;line-height:1;border-radius:6px}

/* ---------- sum grid ---------- */
.sumgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:10px}
.sumgrid button{
  padding:11px 0;font-size:1rem;border-radius:10px;
  background:var(--ivory);color:var(--pip);
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.15);
}
.sumgrid button.starget{background:var(--gold)}
.sumgrid button.shigh{background:var(--green);color:#fff;box-shadow:inset 0 -2px 0 var(--green-dark)}

/* stepper */
.stepper{display:flex;align-items:center;justify-content:center;gap:16px;margin:14px 0}
.stepper button{width:56px;height:56px;font-size:1.6rem;border-radius:50%;background:var(--ivory);color:var(--pip);box-shadow:inset 0 -3px 0 rgba(0,0,0,.15)}
.stepper .val{font-family:'Bungee',cursive;font-size:2.4rem;min-width:70px;text-align:center}

.attack-head{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.attack-head .txt{flex:1;font-weight:700;font-size:.95rem}
.attack-head .txt b{color:var(--gold)}

.banner{
  text-align:center;font-weight:800;font-size:1rem;
  border-radius:10px;padding:10px;margin-bottom:12px;
  background:rgba(248,244,230,.1);
}
.banner.bad{background:rgba(193,58,43,.3)}
.banner.good{background:rgba(120,170,80,.3)}
.quip{display:block;margin-top:6px;font-size:1.1rem;color:var(--gold);animation:quipin .6s cubic-bezier(.2,1.6,.4,1)}
@keyframes quipin{0%{transform:scale(.3) rotate(-6deg);opacity:0}60%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}

.toolbar{display:flex;gap:8px;margin-top:6px}
.toolbar button{flex:1;font-size:.85rem;padding:10px}

/* winner / ranking */
.winner{text-align:center;padding:30px 10px}
.winner .crown{font-size:3.5rem}
.winner .wname{font-family:'Bungee',cursive;font-size:2rem;color:var(--gold);margin:8px 0 4px}
.winner p{color:var(--ivory-dim);font-weight:700;margin-bottom:20px}
.winner .stat{font-size:.85rem;color:var(--ivory-dim);font-weight:700;margin:-10px 0 18px}
.rank-item{display:flex;align-items:center;gap:10px;background:rgba(248,244,230,.08);border-radius:10px;padding:10px 14px;margin-bottom:8px;text-align:left}
.rank-item .pos{font-family:'Bungee',cursive;color:var(--gold);width:30px}
.rank-item .n{flex:1;font-weight:800}
.rank-item .l{font-family:'Bungee',cursive}
.rank-item .l.neg{color:var(--red)}

.hint{font-size:.78rem;color:var(--ivory-dim);font-weight:600;margin-top:8px;line-height:1.4}

/* ---------- Logo / Navigation / Scores / Protokoll / FX ---------- */
.brand-title{display:flex;align-items:center;justify-content:center;gap:10px}
.brand-logo{width:48px;height:48px;border-radius:12px;box-shadow:0 3px 0 rgba(0,0,0,.35);flex:none}
.tabs{display:flex;gap:8px;justify-content:center;margin:0 0 14px}
.tab{flex:1;max-width:160px;background:transparent;color:var(--ivory-dim);border:2px solid rgba(248,244,230,.25);box-shadow:none;font-size:.9rem;padding:10px 12px}
.tab.on{background:var(--gold);color:var(--pip);border-color:var(--gold)}
.score-list{list-style:none;margin-top:6px}
.score-list li{display:flex;align-items:center;gap:10px;background:rgba(248,244,230,.08);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.score-list .val{font-family:'Bungee',cursive;color:var(--gold);min-width:54px}
.score-list.shame .val{color:var(--red)}
.score-list .who{flex:1;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-list .meta{font-size:.72rem;color:var(--ivory-dim);font-weight:800;white-space:nowrap}
details.gamelog summary{cursor:pointer;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.log-list{list-style:none;max-height:240px;overflow:auto}
.log-list li{font-size:.84rem;line-height:1.4;color:var(--ivory-dim);padding:8px 0;border-bottom:1px dashed rgba(248,244,230,.12)}
.log-list li b{color:var(--ivory)}
.log-list li.round{color:var(--gold);font-weight:800}
.fx-overlay{position:fixed;inset:0;z-index:99;pointer-events:none;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:20px}
.fx-msg{font-family:'Bungee',cursive;font-size:clamp(1.25rem,6vw,2rem);line-height:1.2;text-align:center;color:var(--gold);background:rgba(24,28,38,.92);border:3px solid var(--gold);border-radius:18px;padding:16px 20px;box-shadow:var(--shadow);animation:fxPop .45s cubic-bezier(.2,1.6,.4,1) both}
.fx-msg.bad{color:#fff;border-color:var(--red);background:rgba(156,46,34,.94)}
.fx-p{position:absolute;font-size:2rem;animation:fxRain 2.2s ease both}
@keyframes fxPop{from{opacity:0;transform:scale(.55) rotate(-5deg)}to{opacity:1;transform:scale(1) rotate(-1deg)}}
@keyframes fxRain{0%{opacity:0;transform:translateY(-20vh) rotate(0)}12%{opacity:1}100%{opacity:0;transform:translateY(110vh) rotate(280deg)}}

/* ---------- wizard step indicator ---------- */
.stepbar{text-align:center;font-size:.8rem;font-weight:800;color:var(--ivory-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.stepbar b{color:var(--gold)}
.wizard-nav{display:flex;gap:10px;justify-content:space-between;margin-top:4px}
.wizard-nav button{flex:1}

/* ---------- presets ---------- */
.preset-item{display:flex;align-items:center;gap:10px;background:rgba(248,244,230,.08);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.preset-item .pn{flex:1;min-width:0}
.preset-item .pn b{display:block;font-size:.92rem}
.preset-item .pn small{display:block;color:var(--ivory-dim);font-size:.72rem;margin-top:2px;line-height:1.3}
.preset-item .pbtns{display:flex;gap:6px;flex:none}
.preset-item .pbtns button{padding:8px 10px;font-size:.8rem}

/* ---------- Tutto ---------- */
.standing{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed rgba(0,0,0,.12)}
.standing:last-child{border-bottom:none}
.standing .pos{font-family:'Bungee',cursive;width:24px;text-align:center;color:var(--pip);opacity:.55;font-size:.95rem}
.standing.leader .pos{color:var(--gold);opacity:1}
.standing .name{font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.standing .pts{font-weight:800;font-variant-numeric:tabular-nums;font-size:1.05rem}
.standing .bar{height:6px;border-radius:3px;background:rgba(0,0,0,.1);margin-top:4px;overflow:hidden}
.standing .bar i{display:block;height:100%;background:var(--green);border-radius:3px;transition:width .4s ease}
.standing.leader .bar i{background:var(--gold)}

.tutto-entry{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tutto-entry .who{font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ivory)}
.tutto-entry input{width:104px;text-align:right}
.quick{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 14px}
.quick button{background:rgba(248,244,230,.08);border:2px solid rgba(248,244,230,.2);color:var(--ivory-dim);padding:7px 11px;font-size:.78rem;border-radius:8px}

.hist-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px}
table{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
th,td{padding:7px 9px;text-align:right;font-size:.85rem;white-space:nowrap;color:var(--ivory)}
th{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ivory-dim);border-bottom:2px solid rgba(248,244,230,.2)}
th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:var(--felt-dark)}
tbody tr:nth-child(even){background:rgba(248,244,230,.04)}
td.neg{color:#e8837a;font-weight:800}
td.zero{color:var(--ivory-dim)}
tfoot td{border-top:2px solid rgba(248,244,230,.3);font-weight:800;color:var(--gold)}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
'use strict';

/* ============================================================
   GEMEINSAMER KERN (Router / Shell / Helpers)
   ============================================================ */
const $ = sel => document.querySelector(sel);
const app = $('#app');

let currentGame = null;   // null | '30er' | 'tutto'
let currentView = 'play'; // play | scores (nur relevant, wenn ein Spiel aktiv ist)

function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function brandTitle(txt){ return `<h1 class="brand-title"><img class="brand-logo" src="icon-192.png" alt="Logo">${txt}</h1>`; }

/* ---------- Namens-Autovervollständigung ---------- */
function knownPlayerNames(){
  const names = new Set();
  try{ Object.keys((STATS30&&STATS30.players)||{}).forEach(n=>names.add(n)); }catch(e){}
  try{ Object.keys((STATS_TUTTO&&STATS_TUTTO.players)||{}).forEach(n=>names.add(n)); }catch(e){}
  return [...names].sort((a,b)=>a.localeCompare(b,'de'));
}
function nameDatalistHTML(id){
  const names = knownPlayerNames();
  if(!names.length) return '';
  return `<datalist id="${id}">${names.map(n=>`<option value="${esc(n)}">`).join('')}</datalist>`;
}

function dieSVG(v, big=false, colorCls=''){
  let pips=''; for(let i=0;i<9;i++) pips+='<span class="p"></span>';
  return `<span class="die${big?' big':''}${colorCls?' '+colorCls:''}" data-v="${v}" role="img" aria-label="Würfel ${v}">${pips}</span>`;
}

function playFX(kind, text){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  document.querySelectorAll('.fx-overlay').forEach(el=>el.remove());
  const ov=document.createElement('div'); ov.className='fx-overlay';
  const msg=document.createElement('div'); msg.className='fx-msg '+(kind==='bad'?'bad':''); msg.textContent=text; ov.appendChild(msg);
  const emojis = kind==='bad' ? ['💥','⚡','🎲'] : ['🎲','✨','🏆'];
  for(let i=0;i<10;i++){ const p=document.createElement('span'); p.className='fx-p'; p.textContent=emojis[Math.floor(Math.random()*emojis.length)]; p.style.left=(Math.random()*92+2)+'%'; p.style.animationDelay=(Math.random()*.5)+'s'; ov.appendChild(p); }
  document.body.appendChild(ov); setTimeout(()=>ov.remove(),2600);
}

/* ---------- Bildschirm-Wachhalten (Wake Lock) ---------- */
let wakeLock = null;
async function keepAwake(){
  try{ if('wakeLock' in navigator){ wakeLock = await navigator.wakeLock.request('screen'); } }
  catch(e){ /* nicht unterstützt oder abgelehnt — egal */ }
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && currentGame) keepAwake();
});

/* ---------- Spielauswahl-Bildschirm ---------- */
function renderGamePicker(){
  app.innerHTML = `
    ${brandTitle('Würfeltafel')}
    <div class="sub">Welches Spiel möchtet ihr spielen?</div>
    <div class="gamepick">
      <button class="pick-btn p30" onclick="chooseGame('30er')">
        <span class="icon">🎲</span>
        <span class="txt"><b>30er&#8209;Spiel</b><span>Lebenspunkte-Tracker · Würfeln, angreifen, überleben</span></span>
      </button>
      <button class="pick-btn ptutto" onclick="chooseGame('tutto')">
        <span class="icon">🎯</span>

}
function saveStats30(){ try{ localStorage.setItem(STATS_KEY_30, JSON.stringify(STATS30)); }catch(e){} }
function statPlayer30(name){
  if(!STATS30.players[name]) STATS30.players[name] = {wins:0, deaths:0, games:0};
  return STATS30.players[name];
}

function recordBadRoll30(name,sum){

  STATS30.rolls.push({n:name, sum, T:game30.target, short, dice:game30.dice, d:Date.now()});
  STATS30.rolls.sort((a,b)=>b.short-a.short);

function fmtDuration(sec){
  if(sec==null || isNaN(sec)) return '–';
  const m = Math.floor(sec/60), s = Math.round(sec%60);
  if(m<=0) return `${s}s`;
  return `${m} Min ${s}s`;
}

}

/* ---------- Spiel-Logik ---------- */
function stepIdx30(from, step){
  const n = game30.players.length;
  const d = game30.direction==='prev' ? -1 : 1;
  return ((from + d*step) % n + n) % n;
}
function nextTurnIdx30(from){
  const n = game30.players.length;
  for(let s=1;s<=n;s++){
    const i=(from+s)%n;
    if(game30.players[i].alive) return i;
  }
  return from;
}
function attackTargetIdx30(from){
  const n = game30.players.length;
  for(let s=1;s<n;s++){
    const i = stepIdx30(from,s);
    const p = game30.players[i];
    if(!p.alive) continue;
    if(game30.zeroRule && p.lives<0) continue;
    return i;
  }
  return -1;
}
function livingCount30(){ return game30.players.filter(p=>p.alive).length; }
function underZeroCount30(){ return game30.players.filter(p=>p.lives!==null && p.lives<0).length; }

function submitSum30(sum){
  snapshot30();
  const cur = game30.players[game30.currentIdx];
  const T = game30.target;
  const wasUnderZero = game30.zeroRule && cur.lives < 0;
  if(sum<T){
    const dmg = T-sum;
    cur.lives = cur.lives - dmg;
    recordBadRoll30(cur.name, sum);
    addLog30(`<b>${esc(cur.name)}</b> würfelt ${sum} → <b>−${dmg}</b> → Stand <b>${cur.lives}</b>.`);
    let m = `${esc(cur.name)}: ${sum} gewürfelt → −${dmg} Leben`;
    let q = dmg >= Math.ceil(T/4) ? quip('lowRoll') : (dmg<=2 ? quip('tinyMiss') : null);
    if(!game30.zeroRule){
      cur.lives = Math.max(0, cur.lives);
      if(cur.lives===0){ cur.alive=false; recordDeath30(cur.name); addLog30(`💀 <b>${esc(cur.name)}</b> ist ausgeschieden.`); m += ' — ausgeschieden! 💀'; q = quip('elimination'); }
    }
    game30.msg = {text:m, type:'bad', hitIdx:game30.currentIdx, fx:'hit', quip:q};
    endTurn30();
  } else if(sum===T){
    addLog30(`<b>${esc(cur.name)}</b> würfelt genau <b>${T}</b> – nichts passiert.`);
    game30.msg = {text:`${esc(cur.name)}: genau ${T} — nichts passiert.`, type:'', hitIdx:-1, quip:quip('perfect')};
    endTurn30();
  } else {
    const diff = sum-T;
    cur.lives += diff;
    addLog30(`<b>${esc(cur.name)}</b> würfelt ${sum} → <b>+${diff}</b> → Stand <b>${cur.lives}</b>.`);
    if(wasUnderZero){
      let q = cur.lives>=0 ? quip('comeback') : null;
      game30.msg = {text:`${esc(cur.name)}: ${sum} → +${diff} Leben gutgeschrieben (unter 0 gestartet, kein Angriff)`, type:'good', hitIdx:game30.currentIdx, fx:'heal', quip:q};
      endTurn30();
      return;
    }
    game30.attackNum = diff;
    game30.attackCount = 0;
    game30.phase = 'attack';
    const q = diff >= game30.dice ? quip('highRoll') : null;
    game30.msg = {text:`+${diff} Leben gutgeschrieben für ${esc(cur.name)}!`, type:'good', hitIdx:game30.currentIdx, fx:'heal', quip:q};
    render();
  }
}

function changeAttackCount30(d){
  game30.attackCount = Math.max(0, (game30.attackCount||0)+d);
  $('#atkval').textContent = game30.attackCount;
  $('#atkdmg').textContent = game30.attackCount * game30.attackNum;
}

function submitAttack30(){
  snapshot30();
  const cur = game30.players[game30.currentIdx];
  const targetIdx = attackTargetIdx30(game30.currentIdx);
  const dmg = (game30.attackCount||0) * game30.attackNum;
  if(targetIdx<0){
    game30.msg = {text:`Kein gültiges Angriffsziel — alle anderen sind geschützt.`, type:'', hitIdx:-1};
  } else if(dmg>0){
    const target = game30.players[targetIdx];
    target.lives = target.lives - dmg;
    recordSteal30(cur.name, target.name, dmg);
    addLog30(`<b>${esc(cur.name)}</b> trifft <b>${esc(target.name)}</b>: ${game30.attackCount} × ${game30.attackNum} → <b>−${dmg}</b> → Stand <b>${target.lives}</b>.`);
    const face = Math.min(game30.attackNum, 6);
    const special = game30.attackNum > 6 ? ` (à ${game30.attackNum})` : '';
    let m = `${esc(cur.name)} trifft ${esc(target.name)} mit ${game30.attackCount}× ${face}${special} → −${dmg} Leben`;
    let q = dmg >= Math.ceil(game30.target/3) ? quip('bigAttack') : null;
    if(!game30.biggestHit || dmg > game30.biggestHit.dmg){
      game30.biggestHit = {attacker:cur.name, victim:target.name, dmg};
    }
    if(!game30.zeroRule){
      target.lives = Math.max(0, target.lives);
      if(target.lives===0){ target.alive=false; recordDeath30(target.name); addLog30(`💀 <b>${esc(target.name)}</b> ist ausgeschieden.`); m += ' — ausgeschieden! 💀'; q = quip('elimination'); }
    }
    game30.msg = {text:m, type:'bad', hitIdx:targetIdx, fx:'hit', quip:q};
  } else {
    addLog30(`<b>${esc(cur.name)}</b> trifft keine ${Math.min(game30.attackNum,6)}er – kein Abzug.`);
    game30.msg = {text:`${esc(cur.name)}: keine ${Math.min(game30.attackNum,6)}er gewürfelt — Glück gehabt.`, type:'', hitIdx:-1};
  }
  game30.phase='roll';
  endTurn30();
}

function endTurn30(){
  if(game30.zeroRule && underZeroCount30()>=game30.zeroLimit){
    game30.phase='ranking';
    if(!game30.winnerRecorded){ const top=[...game30.players].sort((a,b)=>b.lives-a.lives)[0]; if(top){recordWin30(top.name); addLog30(`🏆 <b>${esc(top.name)}</b> gewinnt.`, 'round');} game30.winnerRecorded=true; finishGame30Duration(); }
    render();
    return;
  }
  if(!game30.zeroRule && livingCount30()<=1){
    game30.phase='winner';
    if(!game30.winnerRecorded){ const w=game30.players.find(p=>p.alive); if(w){recordWin30(w.name); addLog30(`🏆 <b>${esc(w.name)}</b> gewinnt.`, 'round');} game30.winnerRecorded=true; finishGame30Duration(); }
    render();
    return;
  }
  game30.currentIdx = nextTurnIdx30(game30.currentIdx);
  game30.turn++;
  game30.phase='roll';
  render();
}

/* ---------- Render Spiel ---------- */
function sumGrid30(clickFn, highlight=true){
  let grid='';
  const min = game30.dice, max = game30.dice*6, T = game30.target;
  for(let s=min;s<=max;s++){
    const cls = highlight ? (s===T?'starget':(s>T?'shigh':'')) : '';
    grid += `<button class="${cls}" onclick="${clickFn}(${s})">${s}</button>`;
  }
  return `<div class="sumgrid">${grid}</div>`;
}

function render30(){
  if(!game30){ renderSetup30(); return; }
  if(game30.phase==='winner'){ renderWinner30(); return; }
  if(game30.phase==='ranking'){ renderRanking30(); return; }

  const isInit = game30.phase==='init';
  const activeIdx = isInit ? game30.initIdx : game30.currentIdx;
  const cur = game30.players[activeIdx];

  const cards = game30.players.map((p,i)=>{
    const shielded = !isInit && game30.zeroRule && p.lives!==null && p.lives<0;
    const fx = game30.msg && game30.msg.hitIdx===i ? (game30.msg.fx||'') : '';
    const livesTxt = !p.alive ? '✕' : (p.lives===null ? '–' : p.lives);
    return `
    <div class="player-card ${i===activeIdx?'current':''} ${p.alive?'':'dead'} ${shielded?'shield':''} ${fx}">
      <span class="pname">${p.alive?'':'💀 '}${esc(p.name)}${shielded?'<small>🛡 GESCHÜTZT (unter 0)</small>':''}</span>
      <span class="plives ${p.lives!==null&&p.lives<0?'neg':''}">${livesTxt}<small>LEBEN</small></span>
    </div>`;
  }).join('');

  let action='';
  if(isInit){
    action = `
      <div class="panel">
        <h2>Startleben: ${esc(cur.name)}</h2>
        <div class="hint" style="margin:0 0 4px">Alle ${game30.dice} Würfel auf einmal würfeln und die Summe antippen — nichts wird abgezogen.</div>
        ${sumGrid30('submitInit30', false)}
      </div>`;
  } else if(game30.phase==='roll'){
    action = `
      <div class="panel">
        <h2>${esc(cur.name)} würfelt</h2>
        <div class="hint" style="margin:0 0 4px">Endsumme aller ${game30.dice} Würfel antippen:</div>
        ${sumGrid30('submitSum30')}
        <div class="hint">Über ${game30.target}: Differenz wird gutgeschrieben, danach greifst du an.</div>
      </div>`;
  } else if(game30.phase==='attack'){
    const targetIdx = attackTargetIdx30(game30.currentIdx);
    const tName = targetIdx>=0 ? esc(game30.players[targetIdx].name) : '— (alle geschützt)';
    const face = Math.min(game30.attackNum, 6);
    const special = game30.attackNum > 6;
    action = `
      <div class="panel">
        <h2>Angriff! 🎯</h2>
        <div class="attack-head">
          ${dieSVG(face,true,'red')}
          <div class="txt">${esc(cur.name)} jagt <b>${face}er</b>${special?` — jede 6 zählt als <b>${game30.attackNum}</b>`:''}.<br>
          Weiterwürfeln, solange pro Wurf mind. eine ${face} fällt.<br>
          Opfer: <b>${tName}</b></div>
        </div>
        <label style="text-align:center">Wie viele ${face}er liegen am Ende?</label>
        <div class="stepper">
          <button onclick="changeAttackCount30(-1)" aria-label="weniger">−</button>
          <span class="val" id="atkval">${game30.attackCount||0}</span>
          <button onclick="changeAttackCount30(1)" aria-label="mehr">+</button>
        </div>
        <div class="banner">Schaden: <span id="atkdmg">${(game30.attackCount||0)*game30.attackNum}</span> Leben</div>
        <button class="btn-primary btn-wide" onclick="submitAttack30()">Schaden verteilen</button>
      </div>`;
  }

  const dirLabel = game30.direction==='next' ? 'Abzüge →' : 'Abzüge ←';
  const modeLabel = isInit
    ? `Eröffnungsrunde · Startleben würfeln`
    : (game30.zeroRule
      ? `Zug ${game30.turn} · Ende bei ${game30.zeroLimit} unter 0 (aktuell ${underZeroCount30()})`
      : `Zug ${game30.turn} · ${livingCount30()} von ${game30.players.length} übrig`);

  app.innerHTML = `
    ${brandTitle(`${game30.target}er&#8209;Spiel`)}
    <div class="sub">${modeLabel} · ${dirLabel}</div>
    ${game30.msg?`<div class="banner ${game30.msg.type}">${game30.msg.text}${game30.msg.quip?`<span class="quip">${game30.msg.quip}</span>`:''}</div>`:''}
    ${action}
    <div class="panel"><h2>Am Tisch</h2>${cards}</div>
    ${logHTML30()}
    <div class="toolbar">
      <button class="btn-ghost" onclick="undo30()" ${history30.length?'':'disabled'}>↩ Rückgängig</button>
      ${game30.zeroRule?'<button class="btn-ghost" onclick="endZeroGame30()">🏁 Beenden</button>':''}
      <button class="btn-ghost" onclick="confirmReset30()">Neues Spiel</button>
    </div>
  `;
}

function endZeroGame30(){
  if(confirm('Spiel beenden und Rangliste anzeigen?')){
    game30.phase='ranking';
    if(!game30.winnerRecorded){ const top=[...game30.players].sort((a,b)=>b.lives-a.lives)[0]; if(top){recordWin30(top.name); addLog30(`🏆 <b>${esc(top.name)}</b> gewinnt.`, 'round');} game30.winnerRecorded=true; finishGame30Duration(); }
    render();
  }
}

function bigHitLine30(){
  if(!game30.biggestHit) return '';
  const b = game30.biggestHit;
  return `<div class="stat">💥 Grösster Schlag: ${esc(b.attacker)} → ${esc(b.victim)} (−${b.dmg})</div>`;
}
function durationLine30(){
  if(!game30.durationSec) return '';
  return `<div class="stat">⏱ Spieldauer: ${fmtDuration(game30.durationSec)}</div>`;
}
function directionPickerHTML30(){
  return `
    <div class="panel" style="text-align:left">
      <h2>Richtung für die nächste Runde</h2>
      <div class="seg" role="group" aria-label="Angriffsrichtung">
        <button class="${game30.direction==='next'?'on':''}" onclick="setDirRematch30('next')">Nachfolgender Spieler<small>Im Uhrzeigersinn – Abzug trifft den nächsten in der Liste.</small></button>
        <button class="${game30.direction==='prev'?'on':''}" onclick="setDirRematch30('prev')">Vorheriger Spieler<small>Im Gegenuhrzeigersinn – Abzug trifft den vorherigen in der Liste.</small></button>
      </div>
    </div>`;
}
function setDirRematch30(d){ game30.direction = d; render(); }

function renderRanking30(){
  const sorted = [...game30.players].sort((a,b)=>b.lives-a.lives);
  const rows = sorted.map((p,i)=>`
    <div class="rank-item">
      <span class="pos">${i+1}.</span>
      <span class="n">${i===0?'👑 ':''}${esc(p.name)}</span>
      <span class="l ${p.lives<0?'neg':''}">${p.lives}</span>
    </div>`).join('');
  app.innerHTML = `
    ${brandTitle(`${game30.target}er&#8209;Spiel`)}
    <div class="panel winner">
      <div class="crown">👑</div>
      <div class="wname">${esc(sorted[0].name)}</div>
      <p>gewinnt nach ${game30.turn} Zügen!</p>
      ${bigHitLine30()}
      ${durationLine30()}
      ${rows}
    </div>
    ${directionPickerHTML30()}
    <button class="btn-primary btn-wide" onclick="rematch30()">Revanche (gleiche Runde)</button>
    <div style="height:8px"></div>
    <button class="btn-ghost btn-wide" onclick="fullReset30()">Neues Spiel</button>
  `;
}

function renderWinner30(){
  const w = game30.players.find(p=>p.alive);
  app.innerHTML = `
    ${brandTitle(`${game30.target}er&#8209;Spiel`)}
    <div class="panel winner">
      <div class="crown">👑</div>
      <div class="wname">${esc(w?w.name:'—')}</div>
      <p>gewinnt nach ${game30.turn} Zügen mit ${w?w.lives:0} verbleibenden Leben!</p>
      ${bigHitLine30()}
      ${durationLine30()}
    </div>
    ${directionPickerHTML30()}
    <button class="btn-primary btn-wide" onclick="rematch30()">Revanche (gleiche Runde)</button>
    <div style="height:8px"></div>
    <button class="btn-ghost btn-wide" onclick="fullReset30()">Neues Spiel</button>
  `;
}

function rematch30(){
  game30.players.forEach(p=>{ p.lives=null; p.alive=true; });
  game30.phase='init';
  game30.initIdx=0;
  game30.currentIdx=0;
  game30.attackNum=0; game30.attackCount=0;
  game30.msg=null;
  game30.turn=1;
  game30.biggestHit=null;
  game30.winnerRecorded=false;
  game30.log=[];
  game30.startedAt=Date.now();
  game30.durationSec=null;
  history30=[];
  recordGameStart30();
  render();
}
function confirmReset30(){
  if(confirm('Laufendes Spiel wirklich beenden?')) fullReset30();
}
function fullReset30(){ setupPlayers30=[]; setupStep30=1; game30=null; history30=[]; currentGame=null; render(); }

/* ============================================================
   TUTTO!  (rundenbasierte Punktetafel, neu im 30er-Look)
   ============================================================ */
const TUTTO_KEY = 'tutto-tracker-v2';
const TUTTO_STATS_KEY = 'tutto-stats-v1';
let gameTutto = null; // {players:[], target:6000, rounds:[[..]], finished:false}
let lastFocusedTutto = null;

function loadTutto(){
  try{
    const raw = localStorage.getItem(TUTTO_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    if(s && s.players && s.players.length) gameTutto = s;
  }catch(e){}
}
function saveTutto(){ try{ localStorage.setItem(TUTTO_KEY, JSON.stringify(gameTutto)); }catch(e){} }
loadTutto();

function loadStatsTutto(){
  try{
    const s = JSON.parse(localStorage.getItem(TUTTO_STATS_KEY));
    if(s && typeof s==='object') return {
      players:s.players||{},
      bestRound: s.bestRound || null,   // {name, value, d}
      worstRound: s.worstRound || null  // {name, value, d}
    };
  }catch(e){}
  return {players:{}, bestRound:null, worstRound:null};
}
let STATS_TUTTO = loadStatsTutto();
function saveStatsTutto(){ try{ localStorage.setItem(TUTTO_STATS_KEY, JSON.stringify(STATS_TUTTO)); }catch(e){} }
function statPlayerTutto(name){
  if(!STATS_TUTTO.players[name]) STATS_TUTTO.players[name] = {wins:0, games:0, streak:0, maxStreak:0, totalPoints:0, totalRounds:0};
  const p = STATS_TUTTO.players[name];
  // Rückwärtskompatibel: fehlende Felder ergänzen, falls aus älterer Version geladen
  if(p.streak===undefined) p.streak=0;
  if(p.maxStreak===undefined) p.maxStreak=0;
  if(p.totalPoints===undefined) p.totalPoints=0;
  if(p.totalRounds===undefined) p.totalRounds=0;
  return p;
}
function recordRoundTutto(round, playerNames){
  round.forEach((v,i)=>{
    const name = playerNames[i];
    const sp = statPlayerTutto(name);
    sp.totalPoints += v;
    sp.totalRounds += 1;
    if(!STATS_TUTTO.bestRound || v > STATS_TUTTO.bestRound.value){
      STATS_TUTTO.bestRound = {name, value:v, d:Date.now()};
    }
    if(!STATS_TUTTO.worstRound || v < STATS_TUTTO.worstRound.value){
      STATS_TUTTO.worstRound = {name, value:v, d:Date.now()};
    }
  });
  saveStatsTutto();
}
function recordWinStreakTutto(winnerName, allNames){
  allNames.forEach(name=>{
    const sp = statPlayerTutto(name);
    if(name===winnerName){
      sp.streak += 1;
      if(sp.streak > sp.maxStreak) sp.maxStreak = sp.streak;
    } else {
      sp.streak = 0;
    }
  });
  saveStatsTutto();
}

function fmtNum(n){ return n.toLocaleString('de-CH'); }
function totalsTutto(){
  const t = gameTutto.players.map(()=>0);
  gameTutto.rounds.forEach(r=>r.forEach((v,i)=>t[i]+=v));
  return t;
}

/* ---------- Presets (Vorlagen) ---------- */
const PRESET_KEY_TUTTO = 'tutto-presets-v1';
function loadPresetsTutto(){
  try{
    const p = JSON.parse(localStorage.getItem(PRESET_KEY_TUTTO));
    if(Array.isArray(p)) return p;
  }catch(e){}
  return [];
}
let PRESETS_TUTTO = loadPresetsTutto();
function savePresetsTutto(){ try{ localStorage.setItem(PRESET_KEY_TUTTO, JSON.stringify(PRESETS_TUTTO)); }catch(e){} }

function saveCurrentPresetTutto(){
  const nameInput = $('#presetNameInputTutto');
  const name = (nameInput && nameInput.value || '').trim();
  if(!name){ if(nameInput) nameInput.focus(); return; }
  const preset = {
    name,
    players: setupPlayersTutto.filter(n=>n.trim()),
    target: window._tuttoTarget || 6000,
    d: Date.now()
  };
  const idx = PRESETS_TUTTO.findIndex(v=>v.name.toLowerCase()===name.toLowerCase());
  if(idx>=0) PRESETS_TUTTO[idx]=preset; else PRESETS_TUTTO.push(preset);
  PRESETS_TUTTO = PRESETS_TUTTO.slice(0,12);
  savePresetsTutto();
  renderSetupTutto();
}
function loadPresetTutto(i){
  const v = PRESETS_TUTTO[i];
  if(!v) return;
  setupPlayersTutto = v.players.slice();
  while(setupPlayersTutto.length<2) setupPlayersTutto.push('');
  window._tuttoTarget = v.target;
  setupStepTutto = 2;
  renderSetupTutto();
}
function deletePresetTutto(i){
  const v = PRESETS_TUTTO[i];
  if(v && confirm(`Vorlage "${v.name}" löschen?`)){
    PRESETS_TUTTO.splice(i,1);
    savePresetsTutto();
    renderSetupTutto();
  }
}

/* ---------- Setup-Wizard (2 Schritte) ---------- */
let setupPlayersTutto = ['',''];
let setupStepTutto = 1;
function renderTutto(){
  if(!gameTutto){ renderSetupTutto(); return; }
  renderGameTutto();
}

function renderSetupTutto(){
  const step = setupStepTutto;
  const titles = {1:'Spieler & Ziel', 2:'Übersicht & Vorlagen'};

  let body = '';
  if(step===1){
    const rows = setupPlayersTutto.map((name,i)=>`
      <div class="row" style="margin-bottom:8px;align-items:center">
        <input type="text" data-tp="${i}" value="${esc(name)}" placeholder="Spielername ${i+1}" maxlength="20" autocomplete="off" list="playerNamesListTutto">
        <div class="reorder">
          <button class="btn-ghost" style="padding:4px 8px" onclick="moveTuttoField(${i},-1)" ${i===0?'disabled':''} aria-label="Spieler nach oben">▲</button>
          <button class="btn-ghost" style="padding:4px 8px" onclick="moveTuttoField(${i},1)" ${i===setupPlayersTutto.length-1?'disabled':''} aria-label="Spieler nach unten">▼</button>
        </div>
        <button class="btn-ghost" style="flex:none;padding:12px 14px" onclick="removeTuttoField(${i})" ${setupPlayersTutto.length<=2?'disabled':''} aria-label="Spieler entfernen">✕</button>
      </div>`).join('');

    const presetList = PRESETS_TUTTO.length ? `
      <div class="panel">
        <h2>Vorlage laden</h2>
        ${PRESETS_TUTTO.map((v,i)=>`
          <div class="preset-item">
            <div class="pn"><b>${esc(v.name)}</b><small>${v.players.map(esc).join(', ')} · Ziel ${fmtNum(v.target)}</small></div>
            <div class="pbtns">
              <button class="btn-ivory" onclick="loadPresetTutto(${i})">Laden</button>
              <button class="btn-ghost" onclick="deletePresetTutto(${i})" aria-label="Vorlage löschen">✕</button>
            </div>
          </div>`).join('')}
      </div>` : '';

    body = `
      ${presetList}
      <div class="panel">
        <h2>Neues Spiel</h2>
        ${rows}
        <button class="btn-ghost btn-wide" onclick="addTuttoField()" ${setupPlayersTutto.length>=10?'disabled':''}>+ Spieler</button>
        <label style="margin-top:14px">Zielpunktzahl</label>
        <input type="number" id="tuttoTarget" value="${window._tuttoTarget||6000}" step="500" min="500" inputmode="numeric">
        <div class="hint">Wer nach einer abgeschlossenen Runde die Zielpunktzahl erreicht hat, gewinnt. Mit ▲▼ lässt sich die Reihenfolge nachträglich anpassen.</div>
      </div>
      ${nameDatalistHTML('playerNamesListTutto')}
    `;
  } else {
    const names = setupPlayersTutto.map(n=>n.trim()).filter(Boolean);
    body = `
      <div class="panel">
        <h2>Übersicht</h2>
        <div class="hint" style="margin:0 0 10px">Ziel: ${fmtNum(window._tuttoTarget||6000)} Punkte</div>
        ${names.map((n,i)=>`<div class="setup-item"><span class="pos" style="font-family:'Bungee',cursive;color:var(--gold);width:26px">${i+1}.</span><span class="n">${esc(n)}</span></div>`).join('')}
      </div>
      <div class="panel">
        <h2>Als Vorlage speichern</h2>
        <div class="hint" style="margin:0 0 10px">Speichert Spieler und Zielpunktzahl unter einem Namen — praktisch für den nächsten Spieleabend.</div>
        <div class="row">
          <input type="text" id="presetNameInputTutto" maxlength="24" placeholder="z. B. Stammtisch" autocomplete="off">
          <button class="btn-ivory" onclick="saveCurrentPresetTutto()" style="flex:none">Speichern</button>
        </div>
      </div>
    `;
  }

  app.innerHTML = `
    ${brandTitle('Tutto!')}
    <div class="sub">Punktetafel für den Würfeltisch</div>
    <div class="stepbar">Schritt <b>${step}</b> von 2 · ${titles[step]}</div>
    ${body}
    <div class="wizard-nav">
      ${step>1 ? `<button class="btn-ghost" onclick="setupStepTutto--;renderSetupTutto()">← Zurück</button>` : `<button class="btn-ghost" onclick="backToPicker()">← Spielauswahl</button>`}
      ${step<2
        ? `<button class="btn-primary" onclick="setupNextTutto()">Weiter →</button>`
        : `<button class="btn-primary" onclick="startTutto()">Los geht's 🎲</button>`}
    </div>
  `;
  if(step===1){
    app.querySelectorAll('[data-tp]').forEach(inp=>{
      inp.addEventListener('input', e=>{ setupPlayersTutto[+e.target.dataset.tp] = e.target.value; });
    });
    $('#tuttoTarget').addEventListener('input', e=>{ window._tuttoTarget = parseInt(e.target.value,10)||6000; });
  }
}
function setupNextTutto(){
  const names = setupPlayersTutto.map(n=>n.trim()).filter(Boolean);
  if(names.length<2){ alert('Mindestens zwei Spieler eintragen.'); return; }
  setupStepTutto++;
  renderSetupTutto();
}
function addTuttoField(){ if(setupPlayersTutto.length<10){ setupPlayersTutto.push(''); renderSetupTutto(); } }
function removeTuttoField(i){ if(setupPlayersTutto.length>2){ setupPlayersTutto.splice(i,1); renderSetupTutto(); } }
function moveTuttoField(i, dir){
  const j = i+dir;
  if(j<0 || j>=setupPlayersTutto.length) return;
  [setupPlayersTutto[i], setupPlayersTutto[j]] = [setupPlayersTutto[j], setupPlayersTutto[i]];
  renderSetupTutto();
}

function startTutto(){
  const names = setupPlayersTutto.map(n=>n.trim()).filter(Boolean);
  if(names.length<2){ alert('Mindestens zwei Spieler eintragen.'); return; }
  let target = window._tuttoTarget || parseInt((($('#tuttoTarget')||{}).value), 10);
  if(!target || target<500) target = 6000;
  gameTutto = {players:names, target, rounds:[], finished:false};
  names.forEach(n=>statPlayerTutto(n).games++);
  saveStatsTutto();
  saveTutto();
  render();
}

/* ---------- Spielansicht ---------- */
function renderGameTutto(){
  const t = totalsTutto();
  const order = gameTutto.players.map((p,i)=>({name:p, pts:t[i], idx:i})).sort((a,b)=>b.pts-a.pts);
  const max = Math.max(gameTutto.target, order[0]?order[0].pts:0);
  const standings = order.map((o,rank)=>{
    const pct = Math.max(0, Math.min(100, (o.pts/max)*100));
    return `
    <div class="standing ${rank===0 && o.pts>0 ? 'leader':''}">
      <div class="pos">${rank+1}</div>
      <div style="flex:1;min-width:0">
        <div class="name">${esc(o.name)}</div>
        <div class="bar"><i style="width:${pct}%"></i></div>
      </div>
      <div class="pts">${fmtNum(o.pts)}</div>
    </div>`;
  }).join('');

  const rn = gameTutto.rounds.length+1;
  const entries = gameTutto.players.map((p,i)=>`
    <div class="tutto-entry">
      <div class="who">${esc(p)}</div>
      <input type="number" step="50" inputmode="numeric" placeholder="0" data-tidx="${i}" id="tent${i}">
    </div>`).join('');

  const quickVals = [-1000,300,500,1000,2000];
  const quick = quickVals.map(v=>`<button type="button" onclick="quickAddTutto(${v})">${v>0?'+':''}${fmtNum(v)}</button>`).join('');

  let histRows = '';
  gameTutto.rounds.forEach((r,ri)=>{
    histRows += `<tr><td>${ri+1}</td>`;
    r.forEach(v=>{ const cls = v<0?' class="neg"':(v===0?' class="zero"':''); histRows += `<td${cls}>${fmtNum(v)}</td>`; });
    histRows += `</tr>`;
  });
  const totalsRow = `<tr><td>Total</td>${gameTutto.players.map((p,i)=>`<td>${fmtNum(t[i])}</td>`).join('')}</tr>`;
  const headRow = `<th>Runde</th>${gameTutto.players.map(p=>`<th>${esc(p)}</th>`).join('')}`;

  app.innerHTML = `
    ${brandTitle('Tutto!')}
    <div class="sub">Ziel: ${fmtNum(gameTutto.target)} Punkte</div>

    <div class="panel"><h2>Rangliste</h2>${standings}</div>

    <div class="panel">
      <h2>${dieSVG(Math.min(((rn-1)%6)+1,6),false,'gold')} Runde ${rn}</h2>
      <div class="quick">${quick}</div>
      ${entries}
      <button class="btn-primary btn-wide" onclick="commitRoundTutto()">Runde abschliessen</button>
      <div class="hint">Minuspunkte (z.&nbsp;B. Strasse verpasst: −1000) einfach mit Minus eintragen. Leere Felder zählen als 0.</div>
    </div>

    <div class="panel">
      <h2>Verlauf</h2>
      <div class="hist-scroll"><table>
        <thead><tr>${headRow}</tr></thead>
        <tbody>${histRows}</tbody>
        <tfoot>${totalsRow}</tfoot>
      </table></div>
      <div class="toolbar">
        <button class="btn-ghost" onclick="undoRoundTutto()" ${gameTutto.rounds.length?'':'disabled'}>↩ Letzte Runde</button>
        <button class="btn-ghost" onclick="confirmResetTutto()">Neues Spiel</button>
      </div>
    </div>
  `;
  app.querySelectorAll('[data-tidx]').forEach(inp=>{
    inp.addEventListener('focus', ()=>{ lastFocusedTutto = inp; });
  });
  checkWinTutto(false);
}

function quickAddTutto(v){
  if(lastFocusedTutto){
    const cur = parseInt(lastFocusedTutto.value,10)||0;
    lastFocusedTutto.value = cur+v;
    lastFocusedTutto.focus();
  }
}

function commitRoundTutto(){
  const inputs = document.querySelectorAll('[data-tidx]');
  const round = []; let any=false;
  inputs.forEach(inp=>{
    let v = parseInt(inp.value,10);
    if(isNaN(v)) v=0; else any=true;
    round.push(v);
  });
  if(!any){ alert('Keine Punkte eingetragen.'); return; }
  gameTutto.rounds.push(round);
  recordRoundTutto(round, gameTutto.players);
  saveTutto();
  render();
  checkWinTutto(true);
}
function undoRoundTutto(){
  if(!gameTutto.rounds.length) return;
  gameTutto.rounds.pop();
  gameTutto.finished = false;
  saveTutto();
  render();
}
function confirmResetTutto(){
  if(confirm('Spiel wirklich beenden und neu starten?')) resetTutto();
}
function resetTutto(){
  const old = gameTutto;
  gameTutto = null;
  localStorage.removeItem(TUTTO_KEY);
  setupPlayersTutto = old ? old.players.slice() : ['',''];
  window._tuttoTarget = old ? old.target : 6000;
  setupStepTutto = 1;
  render();
}
function checkWinTutto(announce){
  const t = totalsTutto();
  let best=-1, bi=-1;
  t.forEach((v,i)=>{ if(v>=gameTutto.target && v>best){ best=v; bi=i; } });
  if(bi===-1) return;
  if(announce || !gameTutto.finished){
    gameTutto.finished = true;
    statPlayerTutto(gameTutto.players[bi]).wins++;
    recordWinStreakTutto(gameTutto.players[bi], gameTutto.players);
    saveStatsTutto();
    saveTutto();
    renderWinnerTutto(gameTutto.players[bi], best);
  }
}
function renderWinnerTutto(name, score){
  const overlay = document.createElement('div');
  overlay.className = 'fx-overlay';
  overlay.style.pointerEvents = 'auto';
  overlay.style.background = 'rgba(24,28,38,.88)';
  overlay.innerHTML = `
    <div class="panel winner" style="max-width:340px;background:var(--ivory);color:var(--pip);pointer-events:auto">
      <div class="crown">🎉</div>
      <div class="wname" style="color:var(--red)">${esc(name)}</div>
      <p style="color:var(--pip)">hat gewonnen mit <b>${fmtNum(score)}</b> Punkten</p>
      <button class="btn-primary btn-wide" onclick="this.closest('.fx-overlay').remove();resetTutto()">Neues Spiel</button>
      <div style="height:8px"></div>
      <button class="btn-ghost btn-wide" onclick="this.closest('.fx-overlay').remove()">Weiterspielen</button>
    </div>`;
  document.body.appendChild(overlay);
}

function renderScoresTutto(){
  const byWins = Object.entries(STATS_TUTTO.players).filter(([,v])=>v.wins>0).sort((a,b)=>b[1].wins-a[1].wins).slice(0,10);
  const byAvg = Object.entries(STATS_TUTTO.players)
    .filter(([,v])=>v.totalRounds>0)
    .map(([n,v])=>[n, v, v.totalPoints/v.totalRounds])
    .sort((a,b)=>b[2]-a[2]).slice(0,10);
  const byStreak = Object.entries(STATS_TUTTO.players).filter(([,v])=>v.maxStreak>0).sort((a,b)=>b[1].maxStreak-a[1].maxStreak).slice(0,10);
  const empty = t => `<div class="hint">${t}</div>`;
  app.innerHTML = `
    ${brandTitle('Tutto!')}
    <div class="sub">Statistiken bleiben lokal auf diesem Gerät gespeichert</div>
    <div class="panel"><h2>🏆 Hall of Fame</h2>
      ${byWins.length ? `<ol class="score-list">${byWins.map(([n,v])=>`<li><span class="val">${v.wins}×</span><span class="who">${esc(n)}</span><span class="meta">${v.games} Spiele</span></li>`).join('')}</ol>` : empty('Noch keine Siege gespeichert.')}
    </div>
    <div class="panel"><h2>🔥 Beste Siegesserie</h2>
      <div class="hint" style="margin:-4px 0 8px">Wie viele Spiele in Folge jemand am Stück gewonnen hat.</div>
      ${byStreak.length ? `<ol class="score-list">${byStreak.map(([n,v])=>`<li><span class="val">${v.maxStreak}×</span><span class="who">${esc(n)}</span><span class="meta">${v.streak>1?`aktuell ${v.streak}× in Folge`:''}</span></li>`).join('')}</ol>` : empty('Noch keine Serie erfasst.')}
    </div>
    <div class="panel"><h2>📈 Beste Ø-Punkte pro Runde</h2>
      ${byAvg.length ? `<ol class="score-list">${byAvg.map(([n,v,avg])=>`<li><span class="val">${Math.round(avg)}</span><span class="who">${esc(n)}</span><span class="meta">${v.totalRounds} Runden</span></li>`).join('')}</ol>` : empty('Noch keine Runden gespielt.')}
    </div>
    <div class="panel"><h2>🚀 Höchste Rundenpunktzahl</h2>
      ${STATS_TUTTO.bestRound ? `<div class="score-list"><div class="standing"><span class="pos">🥇</span><span class="name">${esc(STATS_TUTTO.bestRound.name)}</span><span class="pts" style="color:var(--pip)">${fmtNum(STATS_TUTTO.bestRound.value)}</span></div></div><div class="hint" style="margin-top:4px">${fmtDate(STATS_TUTTO.bestRound.d)}</div>` : empty('Noch keine Runde erfasst.')}
    </div>
    <div class="panel"><h2>🙈 Niedrigste Rundenpunktzahl</h2>
      ${STATS_TUTTO.worstRound ? `<div class="score-list"><div class="standing"><span class="pos">💩</span><span class="name">${esc(STATS_TUTTO.worstRound.name)}</span><span class="pts" style="color:#e8837a">${fmtNum(STATS_TUTTO.worstRound.value)}</span></div></div><div class="hint" style="margin-top:4px">${fmtDate(STATS_TUTTO.worstRound.d)}</div>` : empty('Noch keine Runde erfasst.')}
    </div>
    <button class="btn-ghost btn-wide" onclick="resetStatsTutto()">Statistiken zurücksetzen</button>
    <div style="height:8px"></div>
    <button class="btn-ghost btn-wide" onclick="backToPicker()">← Zur Spielauswahl</button>
  `;
}
function resetStatsTutto(){ if(confirm('Wirklich alle Statistiken löschen?')){ STATS_TUTTO={players:{}, bestRound:null, worstRound:null}; saveStatsTutto(); render(); } }

/* ============================================================
   START
   ============================================================ */
render();
if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
</body>
</html>
